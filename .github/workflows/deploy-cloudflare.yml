name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro)
        run: npm run build

      # If the Cloudflare Pages dashboard GitHub integration is the deploy
      # path, this step is intentionally skipped and the workflow just acts
      # as build-verification CI. To switch deploy to this Action, set both
      # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repo secrets.
      - name: Check Cloudflare secrets
        id: cf
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] \
             && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "deploy=true"  >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "::notice::Cloudflare secrets not set; skipping Pages deploy step (build verification only)."
          fi

      # Migrated from the archived cloudflare/pages-action (no Node 24 build)
      # to its successor cloudflare/wrangler-action. The pages-action inputs
      # projectName/directory/branch are now expressed via the wrangler command.
      - name: Publish to Cloudflare Pages
        if: steps.cf.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=synos-linux-pro --branch=main
